<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1F2329" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CloudPilot" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>CloudPilot 云驾 · 手机运维</title>
    <script>
      // 早期同步应用主题，避免 zustand persist 异步 hydration 造成闪烁 / 不生效
      (function() {
        try {
          var raw = localStorage.getItem('mobile-ops-theme');
          var mode = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            mode = parsed && parsed.state && parsed.state.mode || 'dark';
          }
          var actual = mode;
          if (mode === 'auto') {
            actual = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', actual);
          if (actual === 'light') {
            document.documentElement.classList.add('light-theme');
          }
          var mt = document.querySelector('meta[name="theme-color"]');
          if (mt) mt.setAttribute('content', actual === 'dark' ? '#1F2329' : '#F5F6F7');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
