name: Build Android APK (Legacy)

on:
  workflow_dispatch:

permissions:
  contents: write  # 允许创建Release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web
        working-directory: frontend
        run: npm run build

      - name: Pack dist.zip (for OTA)
        working-directory: frontend
        run: |
          cd dist
          zip -qr ../dist.zip .
          ls -la ../dist.zip

      - name: Upload dist.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-dist-${{ github.run_number }}
          path: frontend/dist.zip
          retention-days: 30

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: frontend/android/app/build/outputs/apk/debug
        run: |
          ls -la
          mv app-debug.apk mobile-ops-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-apk-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ===== 获取版本信息 =====
      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          BUILD_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          APK_PATH=$(find frontend/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          FILE_SIZE=$(stat -c%s "$APK_PATH")

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_sha=$BUILD_SHA" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Rename APK for release
        run: |
          APK=${{ steps.version.outputs.apk_path }}
          VER=${{ steps.version.outputs.version }}
          DIR=$(dirname "$APK")
          cp "$APK" "$DIR/cloudpilot-v${VER}.apk"
          cp "$APK" "$DIR/cloudpilot-latest.apk"

      # ===== 创建GitHub Release =====
      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log -1 --pretty=%B)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CloudPilot v${{ steps.version.outputs.version }}
          body: |
            **版本**: ${{ steps.version.outputs.version }}
            **构建**: ${{ steps.version.outputs.build_sha }}
            **大小**: ${{ steps.version.outputs.file_size }} 字节
            **发布时间**: ${{ steps.version.outputs.build_time }}

            ## 更新内容
            ${{ steps.changelog.outputs.changelog }}

            ## 下载
            - [cloudpilot-latest.apk](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/cloudpilot-latest.apk) - 直接下载
            - [国内加速镜像1](https://ghproxy.com/https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/cloudpilot-latest.apk)
            - [国内加速镜像2](https://gh.ddlc.top/https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/cloudpilot-latest.apk)

          files: |
            frontend/android/app/build/outputs/apk/debug/cloudpilot-v${{ steps.version.outputs.version }}.apk
            frontend/android/app/build/outputs/apk/debug/cloudpilot-latest.apk
            frontend/dist.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ===== 生成版本信息（使用GitHub镜像加速）=====
      - name: Generate version.json
        run: |
          VER=${{ steps.version.outputs.version }}
          # 使用GitHub镜像加速服务
          DOWNLOAD_URL="https://ghproxy.com/https://github.com/${{ github.repository }}/releases/download/v${VER}/cloudpilot-latest.apk"

          cat > version.json << EOF
          {
            "version": "${VER}",
            "build": "${{ steps.version.outputs.build_sha }}",
            "download_url": "${DOWNLOAD_URL}",
            "changelog": $(git log -1 --pretty=%B | jq -Rs .),
            "required": false,
            "file_size": ${{ steps.version.outputs.file_size }},
            "published_at": "${{ steps.version.outputs.build_time }}"
          }
          EOF
          cat version.json

      - name: Upload version.json to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
