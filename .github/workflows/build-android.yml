name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build web
        working-directory: frontend
        run: npm run build

      - name: Pack dist.zip (for OTA)
        working-directory: frontend
        run: |
          cd dist
          zip -qr ../dist.zip .
          ls -la ../dist.zip

      - name: Upload dist.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-dist-${{ github.run_number }}
          path: frontend/dist.zip
          retention-days: 30

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        working-directory: frontend/android/app/build/outputs/apk/debug
        run: |
          ls -la
          mv app-debug.apk mobile-ops-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-apk-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ===== 上传到腾讯云COS =====
      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          BUILD_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          APK_PATH=$(find frontend/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          FILE_SIZE=$(stat -c%s "$APK_PATH")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_sha=$BUILD_SHA" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Install coscli
        if: env.COS_SECRET_ID != ''
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux -O /tmp/coscli
          chmod +x /tmp/coscli

      - name: Upload to COS
        if: env.COS_SECRET_ID != ''
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_ACCELERATE: ${{ secrets.COS_ACCELERATE }}
        run: |
          # 配置coscli
          /tmp/coscli config set \
            -e cos.${COS_REGION}.myqcloud.com \
            -i ${COS_SECRET_ID} \
            -k ${COS_SECRET_KEY} \
            -b ${COS_BUCKET} \
            --init

          APK=${{ steps.version.outputs.apk_path }}
          VER=${{ steps.version.outputs.version }}

          # 上传APK
          /tmp/coscli cp "$APK" "cos://${COS_BUCKET}/releases/cloudpilot-v${VER}.apk"
          /tmp/coscli cp "$APK" "cos://${COS_BUCKET}/releases/cloudpilot-latest.apk"

          # 生成下载域名
          if [ "$COS_ACCELERATE" = "true" ]; then
            DOMAIN="${COS_BUCKET}.cos.accelerate.myqcloud.com"
          else
            DOMAIN="${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com"
          fi

          # 生成并上传版本信息
          cat > /tmp/latest.json << EOF
          {
            "version": "${VER}",
            "build": "${{ steps.version.outputs.build_sha }}",
            "download_url": "https://${DOMAIN}/releases/cloudpilot-latest.apk",
            "changelog": "$(git log -1 --pretty=%B | head -1 | sed 's/"/\\"/g')",
            "required": false,
            "file_size": ${{ steps.version.outputs.file_size }},
            "published_at": "${{ steps.version.outputs.build_time }}"
          }
          EOF

          /tmp/coscli cp /tmp/latest.json "cos://${COS_BUCKET}/releases/latest.json"
          echo "✅ Uploaded to COS: https://${DOMAIN}/releases/cloudpilot-latest.apk"

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/android/app/build/outputs/apk/debug/*.apk
            frontend/dist.zip
          generate_release_notes: true
