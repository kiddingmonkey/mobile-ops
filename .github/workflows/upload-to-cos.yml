name: Upload APK to Tencent COS

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types:
      - completed

jobs:
  upload-to-cos:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install COS CLI
        run: |
          wget https://github.com/tencentyun/coscli/releases/download/v0.13.0-beta/coscli-linux -O /tmp/coscli
          chmod +x /tmp/coscli

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          BUILD_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILE_SIZE=$(stat -f%z app-release.apk || stat -c%s app-release.apk)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_sha=$BUILD_SHA" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT

      - name: Upload APK to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          /tmp/coscli config set -e cos.${{ env.COS_REGION }}.myqcloud.com -i ${{ env.COS_SECRET_ID }} -k ${{ env.COS_SECRET_KEY }} -b ${{ env.COS_BUCKET }}

          # 上传APK文件
          /tmp/coscli cp app-release.apk cos://releases/cloudpilot-v${{ steps.version.outputs.version }}.apk
          /tmp/coscli cp app-release.apk cos://releases/cloudpilot-latest.apk

      - name: Generate and upload version.json
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
          COS_ACCELERATE: ${{ secrets.COS_ACCELERATE }}
        run: |
          # 根据是否启用全球加速决定下载域名
          if [ "$COS_ACCELERATE" = "true" ]; then
            DOWNLOAD_DOMAIN="${COS_BUCKET}.cos.accelerate.myqcloud.com"
          else
            DOWNLOAD_DOMAIN="${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com"
          fi

          # 生成版本信息JSON
          cat > latest.json << EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "build": "${{ steps.version.outputs.build_sha }}",
            "download_url": "https://${DOWNLOAD_DOMAIN}/releases/cloudpilot-latest.apk",
            "changelog": "$(git log -1 --pretty=%B | head -1)",
            "required": false,
            "file_size": ${{ steps.version.outputs.file_size }},
            "published_at": "${{ steps.version.outputs.build_time }}"
          }
          EOF

          # 上传版本信息
          /tmp/coscli cp latest.json cos://releases/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CloudPilot v${{ steps.version.outputs.version }}
          body: |
            **版本**: ${{ steps.version.outputs.version }}
            **构建**: ${{ steps.version.outputs.build_sha }}
            **大小**: ${{ steps.version.outputs.file_size }} 字节

            下载地址：
            - [腾讯云COS（国内推荐）](https://${{ secrets.COS_BUCKET }}.cos.${{ secrets.COS_REGION }}.myqcloud.com/releases/cloudpilot-v${{ steps.version.outputs.version }}.apk)
            - [GitHub Release](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-release.apk)

            更新内容：
            ${{ github.event.head_commit.message }}
          files: app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
