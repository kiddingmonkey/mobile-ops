# /etc/nginx/conf.d/mobile-ops.conf
# 走自签 SSL，监听 18443
# EIP 端口映射: 101.43.172.231:18443 -> 10.211.79.100:18443

server {
    listen 18443 ssl http2;
    server_name 101-43-172-231.nip.io 101.43.172.231;

    ssl_certificate     /data2/haowu33/mobile/certs/server.crt;
    ssl_certificate_key /data2/haowu33/mobile/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:MOBILEOPS:10m;
    ssl_session_timeout 1d;

    # PWA 支持头
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Service-Worker-Allowed "/" always;

    # CA 证书下载入口 (让手机初次配置)
    location = /ca.crt {
        alias /data2/haowu33/mobile/certs/ca.crt;
        add_header Content-Type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="mobile-ops-ca.crt"';
    }

    # 前端 SPA
    root /data2/haowu33/mobile/frontend/dist;
    index index.html;

    # HTML/manifest/sw 全部不缓存（保证升级后立即生效）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* \.(webmanifest|json)$ {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* /workbox-.*\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 带 hash 的 assets（Vite 自动加 hash，可以永久缓存）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 其他静态资源短缓存
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
